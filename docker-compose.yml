services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/havilah
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB_NAME: havilah_edtech_content
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me
      UV_PROJECT_ENVIRONMENT: /tmp/.venv
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongo
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run celery -A app.worker.celery_app:celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/havilah
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB_NAME: havilah_edtech_content
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me
      UV_PROJECT_ENVIRONMENT: /tmp/.venv
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - mongo
      - redis

  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      WS_REDIS_CHANNEL: havilah:events
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: havilah
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  mongo_data:
  redis_data:
